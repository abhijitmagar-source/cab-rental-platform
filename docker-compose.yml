services:
  web:
    build: .
    container_name: rentme_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis   # ✅ add this
    env_file:
      - .env

  db:
    image: postgres:15
    container_name: rentme_db
    restart: always
    environment:
      POSTGRES_DB: rentme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:   # ✅ ADD THIS BLOCK
    image: redis:7
    container_name: rentme_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: